<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>骰子 · Dice</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#0d2a1e;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#e8f5ec;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:2px}
  .title span{display:block;font-size:12px;opacity:.6;margin-top:2px;font-weight:600}
  .bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;display:flex;gap:8px;
    background:rgba(10,40,28,.5);border:1px solid rgba(140,230,170,.25);padding:8px 12px;border-radius:15px;backdrop-filter:blur(8px)}
  .bar button{font:inherit;font-weight:800;font-size:15px;color:#0d2a1e;border:none;background:linear-gradient(90deg,#8fe6a8,#4dcf88);padding:10px 24px;border-radius:11px;cursor:pointer;box-shadow:0 3px 0 rgba(30,120,70,.5)}
  .hint{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);z-index:4;font-size:13px;font-weight:600;opacity:.6;pointer-events:none;transition:opacity .6s;white-space:nowrap}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>骰子</b><span>点一下 / 摇一摇掷骰子</span></div>
<div class="hint" id="hint">🎲 点桌面掷骰子</div>
<div class="bar"><button id="roll">🎲 掷骰子</button></div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,tx=0,ty=0,tw=0,th=0;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  tw=Math.min(W*0.86,560); th=Math.min(H*0.58,420); tx=(W-tw)/2; ty=(H-th)/2-6;
}
window.addEventListener('resize',resize); resize();

let actx=null,master=null;
function initAudio(){ if(actx)return; try{actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=0.35;master.connect(actx.destination);
  nb=actx.createBuffer(1,actx.sampleRate*0.1,actx.sampleRate);const d=nb.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;}catch(e){} }
let nb=null;
function clack(){ if(!actx)return;const t=actx.currentTime;const s=actx.createBufferSource();s.buffer=nb;const f=actx.createBiquadFilter();f.type='bandpass';f.frequency.value=1800+Math.random()*1200;const g=actx.createGain();g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.06);s.connect(f);f.connect(g);g.connect(master);s.start(t);s.stop(t+0.07); }

const SZ=64;
let dice=[], t=0, result=0, msg='';
function reset(){ dice=[ {x:0,y:0,vx:0,vy:0,ang:0,va:0,face:1,rolling:false}, {x:0,y:0,vx:0,vy:0,ang:0,va:0,face:1,rolling:false} ];
  place(); }
function place(){ dice[0].x=tx+tw*0.38; dice[0].y=ty+th*0.5; dice[1].x=tx+tw*0.62; dice[1].y=ty+th*0.5; }
resize(); reset(); place();

function roll(){ initAudio(); if(actx&&actx.state==='suspended')actx.resume(); if(dice.some(d=>d.rolling))return; result=0;msg='';
  for(const d of dice){ d.rolling=true; d.rollT=0; d.dur=0.9+Math.random()*0.4; const a=Math.random()*6.28; d.vx=Math.cos(a)*(400+Math.random()*300); d.vy=Math.sin(a)*(400+Math.random()*300); d.va=(Math.random()-.5)*24; d.faceT=0; d.face=1+((Math.random()*6)|0); } hideHint(); }
function step(dt){
  let any=false;
  for(const d of dice){ if(!d.rolling)continue; any=true; d.rollT+=dt;
    d.x+=d.vx*dt; d.y+=d.vy*dt; d.ang+=d.va*dt; d.vx*=Math.pow(0.25,dt); d.vy*=Math.pow(0.25,dt); d.va*=Math.pow(0.3,dt);
    const m=SZ*0.72;
    if(d.x<tx+m){d.x=tx+m;d.vx=Math.abs(d.vx)*0.6;clack();} if(d.x>tx+tw-m){d.x=tx+tw-m;d.vx=-Math.abs(d.vx)*0.6;clack();}
    if(d.y<ty+m){d.y=ty+m;d.vy=Math.abs(d.vy)*0.6;clack();} if(d.y>ty+th-m){d.y=ty+th-m;d.vy=-Math.abs(d.vy)*0.6;clack();}
    d.faceT+=dt; if(d.faceT>0.07 && d.rollT<d.dur-0.15){ d.faceT=0; d.face=1+((Math.random()*6)|0); }
    if(d.rollT>=d.dur){ d.rolling=false; d.ang=Math.round(d.ang/(Math.PI/2))*(Math.PI/2); d.vx=d.vy=d.va=0; clack(); }
  }
  // dice-dice separation
  const a=dice[0],b=dice[1]; const dx=b.x-a.x,dy=b.y-a.y,dd=Math.hypot(dx,dy),min=SZ*1.1;
  if(dd<min&&dd>0){ const nx=dx/dd,ny=dy/dd,ov=(min-dd)/2; a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov; }
  if(!any && !result){ result=dice[0].face+dice[1].face; msg=dice[0].face===dice[1].face?('豹子！'+dice[0].face+dice[0].face):('点数 '+result); }
}
const PIPS={1:[[1,1]],2:[[0,0],[2,2]],3:[[0,0],[1,1],[2,2]],4:[[0,0],[2,0],[0,2],[2,2]],5:[[0,0],[2,0],[1,1],[0,2],[2,2]],6:[[0,0],[2,0],[0,1],[2,1],[0,2],[2,2]]};
function die(d){
  ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.ang);
  ctx.shadowColor='rgba(0,0,0,.35)';ctx.shadowBlur=14;ctx.shadowOffsetY=6;
  const g=ctx.createLinearGradient(-SZ/2,-SZ/2,SZ/2,SZ/2);g.addColorStop(0,'#fff');g.addColorStop(1,'#e6e6ee');
  ctx.fillStyle=g;ctx.beginPath();ctx.roundRect?ctx.roundRect(-SZ/2,-SZ/2,SZ,SZ,14):ctx.rect(-SZ/2,-SZ/2,SZ,SZ);ctx.fill();
  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  const pip=SZ*0.14, gap=SZ*0.28;
  const doubles = !dice[0].rolling && !dice[1].rolling && dice[0].face===dice[1].face;
  ctx.fillStyle=doubles?'#e0333a':'#2a2a33';
  for(const [px,py] of PIPS[d.face]){ ctx.beginPath();ctx.arc((px-1)*gap,(py-1)*gap,pip,0,6.28);ctx.fill(); }
  ctx.restore();
}
function draw(){
  ctx.fillStyle='#0d2a1e'; ctx.fillRect(0,0,W,H);
  // felt table
  const g=ctx.createRadialGradient(W/2,ty+th/2,20,W/2,ty+th/2,tw*0.7);g.addColorStop(0,'#1f6a44');g.addColorStop(1,'#134d30');
  ctx.fillStyle=g; ctx.beginPath();ctx.roundRect?ctx.roundRect(tx,ty,tw,th,20):ctx.rect(tx,ty,tw,th);ctx.fill();
  ctx.strokeStyle='#8a5a2a';ctx.lineWidth=10;ctx.beginPath();ctx.roundRect?ctx.roundRect(tx,ty,tw,th,20):ctx.rect(tx,ty,tw,th);ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;for(let i=1;i<6;i++){ctx.beginPath();ctx.moveTo(tx,ty+th*i/6);ctx.lineTo(tx+tw,ty+th*i/6);ctx.stroke();}
  for(const d of dice) die(d);
  // result
  if(msg){ ctx.fillStyle=msg.includes('豹子')?'#ffd24d':'#e8f5ec';ctx.font='800 32px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText(msg,W/2,ty-18); ctx.textAlign='left'; }
  else if(dice.some(d=>d.rolling)){ ctx.fillStyle='rgba(232,245,236,.6)';ctx.font='700 22px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText('掷…',W/2,ty-18);ctx.textAlign='left'; }
}
let last=performance.now();
function frame(now){ const dt=Math.min((now-last)/1000,0.033); last=now; t+=dt; step(dt); draw(); requestAnimationFrame(frame); }

cv.addEventListener('pointerdown',e=>{e.preventDefault();roll();});
document.getElementById('roll').onclick=roll;
let hintGone=false; function hideHint(){if(hintGone)return;hintGone=true;document.getElementById('hint').style.opacity=0;}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
