<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>萤火虫 · Fireflies</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#050f0c;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#cfe6d6;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:3px}
  .title span{display:block;font-size:12px;opacity:.55;margin-top:3px;font-weight:600}
  .bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;display:flex;gap:8px;
    background:rgba(14,28,22,.5);border:1px solid rgba(150,220,160,.2);padding:8px 12px;border-radius:15px;backdrop-filter:blur(10px)}
  .bar button{font:inherit;font-weight:700;font-size:13px;color:#cfe6d6;border:1px solid rgba(160,225,170,.25);background:rgba(255,255,255,.05);padding:8px 13px;border-radius:11px;cursor:pointer}
  .bar button.on{background:linear-gradient(90deg,#a8e85a,#5ad0a0);border-color:transparent;color:#0a2018}
  .hint{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);z-index:4;font-size:13px;font-weight:600;opacity:.6;pointer-events:none;transition:opacity .6s;white-space:nowrap}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>萤火虫</b><span>放上手指，它们会聚过来</span></div>
<div class="hint" id="hint">🌿 手指放上去，看它们同步闪</div>
<div class="bar"><button id="sync" class="on">🔆 同步</button><button id="scatter">💨 打散</button></div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,flies=[],grass=[];
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  grass=[]; for(let i=0;i<80;i++) grass.push({x:Math.random()*W,h:20+Math.random()*70,w:2+Math.random()*3,sw:Math.random()*6.28});
}
window.addEventListener('resize',resize); resize();

function make(){ flies=[]; const n=Math.round(W*H/9000);
  for(let i=0;i<n;i++) flies.push({x:Math.random()*W,y:Math.random()*H*0.85,vx:0,vy:0,
    ph:Math.random()*6.28, fr:2.0+Math.random()*0.6, wph:Math.random()*6.28, hue:70+Math.random()*30}); }
resize(); make();

let SYNC=true, t=0, pointer={x:-999,y:-999,on:false};
function step(dt){
  // Kuramoto mean field (global coupling) for blink synchronization
  let mx=0,my=0; for(const f of flies){ mx+=Math.cos(f.ph); my+=Math.sin(f.ph); } mx/=flies.length; my/=flies.length;
  const K=SYNC?3.2:0;
  for(const f of flies){
    f.ph += f.fr*dt + K*(my*Math.cos(f.ph)-mx*Math.sin(f.ph))*dt;
    // wander
    f.wph+=dt*0.7; let ax=Math.cos(f.wph*1.3)*10+Math.sin(f.wph)*8, ay=Math.sin(f.wph*1.1)*10+Math.cos(f.wph*0.7)*8;
    if(pointer.on){ const dx=pointer.x-f.x,dy=pointer.y-f.y,d=Math.hypot(dx,dy)+1; ax+=dx/d*90; ay+=dy/d*90; if(d<70){ax-=dx/d*130;ay-=dy/d*130;} }
    f.vx+=ax*dt; f.vy+=ay*dt; f.vx*=0.94; f.vy*=0.94;
    f.x+=f.vx*dt; f.y+=f.vy*dt;
    if(f.x<10){f.x=10;f.vx=Math.abs(f.vx);} if(f.x>W-10){f.x=W-10;f.vx=-Math.abs(f.vx);}
    if(f.y<10){f.y=10;f.vy=Math.abs(f.vy);} if(f.y>H-20){f.y=H-20;f.vy=-Math.abs(f.vy);}
  }
}
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#06140f'); g.addColorStop(0.6,'#08180f'); g.addColorStop(1,'#0a1c10');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter';
  for(const f of flies){ const b=Math.max(0,Math.sin(f.ph)); const br=b*b*b;
    const a=0.12+br*0.88; const r=1.6+br*3.2;
    const rg=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,r*4.5);
    rg.addColorStop(0,'hsla('+f.hue+',100%,'+(60+br*25)+'%,'+a+')'); rg.addColorStop(1,'hsla('+f.hue+',100%,60%,0)');
    ctx.fillStyle=rg; ctx.fillRect(f.x-r*4.5,f.y-r*4.5,r*9,r*9);
    ctx.fillStyle='hsla('+f.hue+',100%,'+(75+br*20)+'%,'+(0.3+br*0.7)+')'; ctx.beginPath();ctx.arc(f.x,f.y,r*0.7,0,6.28);ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';
  // grass silhouette
  ctx.strokeStyle='#04120a'; ctx.lineCap='round';
  for(const gr of grass){ ctx.lineWidth=gr.w; const sway=Math.sin(t*1.1+gr.sw)*8; ctx.beginPath();ctx.moveTo(gr.x,H);ctx.quadraticCurveTo(gr.x+sway*0.5,H-gr.h*0.6,gr.x+sway,H-gr.h);ctx.stroke(); }
}
let last=performance.now();
function frame(now){ const dt=Math.min((now-last)/1000,0.04); last=now; t+=dt; step(dt); draw(); requestAnimationFrame(frame); }

cv.addEventListener('pointerdown',e=>{e.preventDefault();cv.setPointerCapture(e.pointerId);pointer.x=e.clientX;pointer.y=e.clientY;pointer.on=true;hideHint();});
cv.addEventListener('pointermove',e=>{pointer.x=e.clientX;pointer.y=e.clientY;});
cv.addEventListener('pointerup',()=>pointer.on=false);
cv.addEventListener('pointercancel',()=>pointer.on=false);
let hintGone=false; function hideHint(){if(hintGone)return;hintGone=true;document.getElementById('hint').style.opacity=0;}
document.getElementById('sync').onclick=e=>{SYNC=!SYNC;e.target.classList.toggle('on',SYNC);};
document.getElementById('scatter').onclick=()=>{ for(const f of flies){ f.vx+=(Math.random()-.5)*400; f.vy+=(Math.random()-.5)*400; f.ph=Math.random()*6.28; } };
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
