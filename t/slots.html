<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>老虎机 · Slots</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#3a1240;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#ffe6a8;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:1px}
  .title span{display:block;font-size:12px;opacity:.6;margin-top:2px;font-weight:600}
  .bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;display:flex;gap:10px;
    background:rgba(40,10,45,.5);border:1px solid rgba(255,200,120,.25);padding:8px 12px;border-radius:15px;backdrop-filter:blur(8px)}
  .bar button{font:inherit;font-weight:800;font-size:16px;color:#3a1240;border:none;background:linear-gradient(90deg,#ffd24d,#ff8a3d);padding:11px 30px;border-radius:12px;cursor:pointer;box-shadow:0 3px 0 rgba(180,90,20,.5)}
  .bar button:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(180,90,20,.5)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>老虎机</b><span>点 SPIN 转，三个一样中大奖</span></div>
<div class="bar"><button id="spin">🎰 SPIN</button></div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize); resize();

let actx=null,master=null;
function initAudio(){ if(actx)return; try{actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=0.4;master.connect(actx.destination);}catch(e){} }
function click(f){ if(!actx)return;const t=actx.currentTime;const o=actx.createOscillator();o.type='square';o.frequency.value=f||600;const g=actx.createGain();g.gain.setValueAtTime(0.2,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.05);o.connect(g);g.connect(master);o.start(t);o.stop(t+0.06);}
function jackpot(){ if(!actx)return;[0,4,7,12,16].forEach((s,i)=>{const o=actx.createOscillator();o.type='triangle';o.frequency.value=523*Math.pow(2,s/12);const g=actx.createGain();const t=actx.currentTime+i*0.08;g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.3,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.4);o.connect(g);g.connect(master);o.start(t);o.stop(t+0.42);});}

const SYM=['🍒','🍋','🍊','🍉','🔔','⭐','7️⃣'];
const N=SYM.length;
let reels, credits=100, msg='', msgT=0, confetti=[], t=0;
function reset(){ reels=[]; for(let i=0;i<3;i++) reels.push({off:Math.random()*N*100,v:0,spinning:false,decel:false,stopT:0}); }
resize(); reset();

let symH=0, reelW=0, bx=0, by=0, bw=0, bh=0;
function layout(){ bw=Math.min(W*0.86,460); reelW=bw/3-10; symH=Math.min(reelW*0.9,H*0.16); bh=symH*3+30; bx=(W-bw)/2; by=(H-bh)/2-10; }
function spin(){ initAudio(); if(actx&&actx.state==='suspended')actx.resume(); if(reels.some(r=>r.spinning))return; if(credits<5){credits=100;} credits-=5; msg='';
  reels.forEach((r,i)=>{ r.spinning=true; r.decel=false; r.v=1400+Math.random()*300; r.stopT=t+0.7+i*0.45; }); }
function payline(){ return reels.map(r=>SYM[((Math.round(r.off/symH))%N+N)%N]); }
function step(dt){
  layout();
  reels.forEach((r,i)=>{ if(!r.spinning)return; r.off+=r.v*dt;
    if(t>r.stopT){ r.v*=Math.pow(0.06,dt); if(r.v<40){ r.off=Math.round(r.off/symH)*symH; r.v=0; r.spinning=false; click(500+i*120); if(!reels.some(rr=>rr.spinning))resolve(); } }
  });
  for(let i=confetti.length-1;i>=0;i--){const p=confetti[i];p.life-=dt;p.vy+=520*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.rot+=p.rv*dt;if(p.life<=0)confetti.splice(i,1);}
  if(msgT>0)msgT-=dt;
}
function resolve(){ const pl=payline();
  if(pl[0]===pl[1]&&pl[1]===pl[2]){ const val=(SYM.indexOf(pl[0])+2)*30; credits+=val; msg='🎉 大奖 +'+val+' 🎉'; msgT=2.2; jackpot(); burst(); }
  else if(pl[0]===pl[1]||pl[1]===pl[2]){ credits+=10; msg='小奖 +10'; msgT=1.4; click(800); }
  else { msg='再试一次'; msgT=1.0; }
}
function burst(){ for(let i=0;i<140;i++){const a=Math.random()*6.28,s=180+Math.random()*380;confetti.push({x:W/2,y:by,vx:Math.cos(a)*s,vy:Math.sin(a)*s-180,life:1.8,hue:(Math.random()*360)|0,rot:Math.random()*6.28,rv:(Math.random()-.5)*10});} }

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'#4a1650');g.addColorStop(1,'#2a0d30');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // machine frame
  ctx.fillStyle='#c02a5a';rr(bx-18,by-26,bw+36,bh+52,18);ctx.fill();
  ctx.fillStyle='#ffd24d';rr(bx-10,by-18,bw+20,bh+36,14);ctx.fill();
  // marquee lights
  const nl=14; for(let i=0;i<nl;i++){ const on=(Math.floor(t*6)+i)%2; ctx.fillStyle=on?'#fff6c0':'#ff6a3d'; ctx.beginPath();ctx.arc(bx-6+ (bw+12)*i/(nl-1), by-30, 5,0,6.28);ctx.fill(); }
  // reels
  for(let i=0;i<3;i++){ const rx=bx+i*(reelW+10)+5, ry=by, r=reels[i];
    ctx.save(); rr(rx,ry,reelW,symH*3,10); ctx.fillStyle='#fff'; ctx.fill(); ctx.clip();
    const first=Math.floor(r.off/symH), off=r.off-first*symH;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=Math.floor(symH*0.62)+'px sans-serif';
    for(let j=-1;j<=3;j++){ const idx=((first+j)%N+N)%N; const y=ry+symH*1.5 + (j)*symH - off; ctx.fillText(SYM[idx], rx+reelW/2, y); }
    ctx.restore();
    ctx.strokeStyle='#b8863a';ctx.lineWidth=3;rr(rx,ry,reelW,symH*3,10);ctx.stroke();
  }
  // payline
  ctx.strokeStyle='rgba(255,60,90,.85)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(bx-2,by+symH*1.5);ctx.lineTo(bx+bw+2,by+symH*1.5);ctx.stroke();
  // confetti
  for(const p of confetti){ctx.save();ctx.globalAlpha=Math.max(0,p.life/1.8);ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle='hsl('+p.hue+',90%,60%)';ctx.fillRect(-4,-4,8,8);ctx.restore();}
  // credits + msg
  ctx.fillStyle='#ffe6a8';ctx.font='800 26px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='alphabetic';ctx.fillText('💰 '+credits, W/2, by-42);
  if(msgT>0){ ctx.globalAlpha=Math.min(1,msgT); ctx.fillStyle='#ffd24d';ctx.font='800 30px -apple-system,sans-serif';ctx.fillText(msg,W/2,by+bh+56);ctx.globalAlpha=1; }
  ctx.textAlign='left';
}
let last=performance.now();
function frame(now){ const dt=Math.min((now-last)/1000,0.033); last=now; t+=dt; step(dt); draw(); requestAnimationFrame(frame); }

cv.addEventListener('pointerdown',e=>{e.preventDefault();spin();});
document.getElementById('spin').onclick=spin;
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
