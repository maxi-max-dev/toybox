<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>万花尺 · Spirograph</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#06060f;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#dfe0ff;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:2px}
  .title span{display:block;font-size:12px;opacity:.55;margin-top:3px;font-weight:600}
  .bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(18,18,40,.5);border:1px solid rgba(150,140,255,.22);padding:8px 12px;border-radius:15px;backdrop-filter:blur(8px)}
  .bar button{font:inherit;font-weight:700;font-size:13px;color:#dfe0ff;border:1px solid rgba(160,150,255,.25);background:rgba(255,255,255,.05);padding:8px 13px;border-radius:11px;cursor:pointer}
  .bar button.on{background:linear-gradient(90deg,#7a6cff,#ff6ad0);border-color:transparent;color:#fff}
  .bar .s{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;opacity:.9}
  .bar input{width:90px;accent-color:#a97bff}
  .hint{position:fixed;left:50%;bottom:66px;transform:translateX(-50%);z-index:4;font-size:13px;font-weight:600;opacity:.5;pointer-events:none;transition:opacity .6s;white-space:nowrap}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>万花尺</b><span>笔尖转呀转，画出对称花纹</span></div>
<div class="hint" id="hint">✦ 换个花样，看它自己画 ✦</div>
<div class="bar">
  <button id="rand" class="on">🎲 换花样</button>
  <div class="s">齿 <input id="teeth" type="range" min="20" max="84" value="53"></div>
  <div class="s">笔 <input id="pen" type="range" min="10" max="90" value="55"></div>
  <button id="clear">🧹 重画</button>
</div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,cx=0,cy=0,SC=0;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cx=W/2; cy=H*0.46; SC=Math.min(W,H)*0.42;
  ctx.fillStyle='#06060f'; ctx.fillRect(0,0,W,H);
  if(theta>0.01) repaint();
}
window.addEventListener('resize',resize);

function gcd(a,b){return b?gcd(b,a%b):a;}
let R=96, r=53, dFrac=0.55, theta=0, thetaMax=0, pts=[], hue0=0;
function setup(){ R=96; const g=gcd(R,r); thetaMax=Math.PI*2*(r/g); theta=0; pts=[]; hue0=(Math.random()*360)|0;
  ctx.globalCompositeOperation='source-over'; ctx.fillStyle='#06060f'; ctx.fillRect(0,0,W,H); }
function pos(th){ const rr=R-r, d=dFrac*r, k=rr/r; const norm=SC/(rr+d);
  return [cx+(rr*Math.cos(th)+d*Math.cos(k*th))*norm, cy+(rr*Math.sin(th)-d*Math.sin(k*th))*norm]; }
function repaint(){ // re-stroke the whole curve up to current theta (used after a resize clears the canvas)
  const N=Math.max(2,Math.ceil(theta/(thetaMax/2400))); const dth=theta/N; let prev=pos(0);
  ctx.globalCompositeOperation='lighter';
  for(let i=1;i<=N;i++){ const th=dth*i, p=pos(th), hue=(hue0+th/thetaMax*300)%360;
    ctx.strokeStyle='hsla('+hue+',95%,65%,0.9)'; ctx.lineWidth=2; ctx.shadowColor='hsla('+hue+',95%,60%,0.9)'; ctx.shadowBlur=6;
    ctx.beginPath();ctx.moveTo(prev[0],prev[1]);ctx.lineTo(p[0],p[1]);ctx.stroke(); prev=p; }
  ctx.shadowBlur=0; ctx.globalCompositeOperation='source-over'; }
resize(); setup();

function step(dt){
  const speed=thetaMax/6; // finish drawing in ~6s
  let adv=speed*dt; const sub=Math.max(1,Math.ceil(adv/(thetaMax/1200)));
  ctx.globalCompositeOperation='lighter';
  for(let i=0;i<sub;i++){ if(theta>=thetaMax){ break; }
    const p0=pos(theta); theta+=adv/sub; const p1=pos(theta);
    const hue=(hue0+theta/thetaMax*300)%360;
    ctx.strokeStyle='hsla('+hue+',95%,65%,0.9)'; ctx.lineWidth=2; ctx.shadowColor='hsla('+hue+',95%,60%,0.9)';ctx.shadowBlur=6;
    ctx.beginPath();ctx.moveTo(p0[0],p0[1]);ctx.lineTo(p1[0],p1[1]);ctx.stroke();
  }
  ctx.shadowBlur=0; ctx.globalCompositeOperation='source-over';
  penPos=pos(Math.min(theta,thetaMax));
}
let penPos=[0,0];
function draw(){ // overlay pen dot on top without clearing the accumulated curve
  ctx.save();ctx.globalCompositeOperation='lighter';ctx.fillStyle='rgba(255,255,255,.95)';ctx.beginPath();ctx.arc(penPos[0],penPos[1],3.5,0,6.28);ctx.fill();ctx.restore();
}
let last=performance.now(), penClear=null;
function frame(now){ const dt=Math.min((now-last)/1000,0.04); last=now;
  // erase previous pen dot by redrawing? we use additive so pen dot leaves faint trail; keep it subtle
  if(theta<thetaMax) step(dt);
  draw();
  requestAnimationFrame(frame);
}

function randomize(){ r=20+((Math.random()*64)|0); dFrac=0.2+Math.random()*0.75; document.getElementById('teeth').value=r; document.getElementById('pen').value=Math.round(dFrac*100); setup(); hideHint(); }
document.getElementById('rand').onclick=randomize;
document.getElementById('teeth').addEventListener('input',e=>{ r=+e.target.value; setup(); });
document.getElementById('pen').addEventListener('input',e=>{ dFrac=+e.target.value/100; setup(); });
document.getElementById('clear').onclick=()=>setup();
let hintGone=false; function hideHint(){if(hintGone)return;hintGone=true;document.getElementById('hint').style.opacity=0;}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
