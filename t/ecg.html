<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>心电图 · ECG</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#04120a;
    font-family:"SF Mono",ui-monospace,Menlo,monospace;color:#4dff9a;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:18px;font-weight:800;letter-spacing:2px;color:#7effb8;text-shadow:0 0 6px rgba(77,255,154,.5)}
  .title span{display:block;font-size:11px;opacity:.6;margin-top:3px;font-weight:600;letter-spacing:1px}
  .bar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:6;display:flex;gap:8px;
    background:rgba(10,30,18,.5);border:1px solid rgba(77,255,154,.25);padding:8px 12px;border-radius:14px;backdrop-filter:blur(8px)}
  .bar button{font:inherit;font-weight:700;font-size:15px;color:#4dff9a;border:1px solid rgba(77,255,154,.3);background:rgba(255,255,255,.05);padding:8px 18px;border-radius:10px;cursor:pointer}
  .hint{position:fixed;left:50%;bottom:66px;transform:translateX(-50%);z-index:4;font-size:12px;font-weight:600;opacity:.55;pointer-events:none;transition:opacity .6s;white-space:nowrap;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>心电监护</b><span>上下拖 / 按钮 调心率</span></div>
<div class="hint" id="hint">↕ 上下拖动调心率快慢</div>
<div class="bar"><button id="dn">－</button><button id="up">＋</button></div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,buf,baseY,amp;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  buf=new Float32Array(W).fill(NaN); baseY=H*0.5; amp=Math.min(H*0.28,160);
}
window.addEventListener('resize',resize); resize();

let actx=null,master=null;
function initAudio(){ if(actx)return; try{actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=0.3;master.connect(actx.destination);}catch(e){} }
function beep(){ if(!actx)return;const t=actx.currentTime;const o=actx.createOscillator();o.type='sine';o.frequency.value=880;const g=actx.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.3,t+0.004);g.gain.exponentialRampToValueAtTime(0.0001,t+0.09);o.connect(g);g.connect(master);o.start(t);o.stop(t+0.1);}

let bpm=72, cursor=0, t=0, flash=0;
function g(p,c,w,h){ const d=(p-c)/w; return h*Math.exp(-d*d); }
function ecg(p){ p=(p%1+1)%1; let v=0;
  v+=g(p,0.15,0.035,0.12);          // P
  v-=g(p,0.26,0.012,0.09);          // Q
  v+=g(p,0.30,0.010,1.0);           // R (spike)
  v-=g(p,0.34,0.014,0.22);          // S
  v+=g(p,0.55,0.06,0.22);           // T
  return v;
}
function step(dt){
  initAudioMaybe();
  const speed=W/5; // sweep across in 5s
  let px0=Math.floor(cursor); cursor+=speed*dt; if(cursor>=W)cursor-=W; let px1=Math.floor(cursor);
  const cyc=bpm/60;
  const drawPx=(x)=>{ x=((x%W)+W)%W; const phase=(t + (x-cursor)/speed)*cyc; // approx time at this pixel = now (drawing head)
    const val=ecg((t*cyc)%1); buf[x]=baseY - val*amp;
    // erase gap ahead
    buf[((x+8)%W+W)%W]=NaN;
  };
  // detect R for beep: R at phase 0.30
  const prevPhase=((t-dt)*cyc)%1, curPhase=(t*cyc)%1;
  const crossedR = prevPhase<0.30 ? (curPhase>=0.30 || curPhase<prevPhase) : (curPhase>=0.30 && curPhase<prevPhase);
  if(px1>=px0){ for(let x=px0;x<=px1;x++)drawPx(x); } else { for(let x=px0;x<W;x++)drawPx(x); for(let x=0;x<=px1;x++)drawPx(x); }
  t+=0; // t advanced below
  if(crossedR){ beep(); flash=1; }
  if(flash>0)flash-=dt*4;
}
let audioInit=false; function initAudioMaybe(){}
function draw(){
  ctx.fillStyle='#04120a'; ctx.fillRect(0,0,W,H);
  // grid
  ctx.strokeStyle='rgba(60,180,110,.10)';ctx.lineWidth=1; const gs=Math.max(18,W/40);
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.strokeStyle='rgba(60,180,110,.22)';for(let x=0;x<W;x+=gs*5){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  // trace
  ctx.strokeStyle='#4dff9a';ctx.lineWidth=2.4;ctx.lineCap='round';ctx.lineJoin='round';ctx.shadowColor='rgba(77,255,154,.7)';ctx.shadowBlur=8;
  ctx.beginPath();let pen=false;
  for(let x=0;x<W;x++){ const y=buf[x]; if(isNaN(y)){pen=false;continue;} if(!pen){ctx.moveTo(x,y);pen=true;}else ctx.lineTo(x,y); }
  ctx.stroke();ctx.shadowBlur=0;
  // cursor dot
  const cy=buf[Math.floor(cursor)]; if(!isNaN(cy)){ ctx.fillStyle='#dfffe8';ctx.beginPath();ctx.arc(cursor,cy,3.5,0,6.28);ctx.fill(); }
  // BPM
  ctx.fillStyle=flash>0?'#dfffe8':'#4dff9a';ctx.font='800 '+Math.floor(H*0.11)+'px "SF Mono",monospace';ctx.textAlign='right';ctx.textBaseline='alphabetic';
  ctx.shadowColor='rgba(77,255,154,'+(0.4+flash*0.5)+')';ctx.shadowBlur=12+flash*20; ctx.fillText(Math.round(bpm), W-24, H*0.2); ctx.shadowBlur=0;
  ctx.font='700 16px "SF Mono",monospace';ctx.fillText('BPM', W-24, H*0.2+22);
  // heart icon pulse
  const sc=1+flash*0.4; ctx.font=Math.floor(28*sc)+'px sans-serif';ctx.textAlign='left';ctx.fillText('❤️', 24, H*0.2); ctx.textAlign='left';
}
let last=performance.now();
function frame(now){ const dt=Math.min((now-last)/1000,0.04); last=now; t+=dt; step(dt); draw(); requestAnimationFrame(frame); }

let down=false,sy=0,sb=0;
cv.addEventListener('pointerdown',e=>{e.preventDefault();cv.setPointerCapture(e.pointerId);initAudio();if(actx&&actx.state==='suspended')actx.resume();down=true;sy=e.clientY;sb=bpm;hideHint();});
cv.addEventListener('pointermove',e=>{ if(down){ bpm=Math.max(35,Math.min(200, sb+(sy-e.clientY)*0.5)); } });
cv.addEventListener('pointerup',()=>down=false);
cv.addEventListener('pointercancel',()=>down=false);
document.getElementById('up').onclick=()=>{initAudio();if(actx&&actx.state==='suspended')actx.resume();bpm=Math.min(200,bpm+8);};
document.getElementById('dn').onclick=()=>{bpm=Math.max(35,bpm-8);};
let hintGone=false; function hideHint(){if(hintGone)return;hintGone=true;document.getElementById('hint').style.opacity=0;}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
