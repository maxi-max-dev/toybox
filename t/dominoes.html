<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>多米诺 · Dominoes</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#eaf2f6;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#43515c;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:1px;text-shadow:0 1px 0 rgba(255,255,255,.7)}
  .title span{display:block;font-size:12px;opacity:.6;margin-top:2px;font-weight:600}
  .bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;display:flex;gap:8px;
    background:rgba(255,255,255,.8);border:1px solid rgba(90,110,130,.2);padding:8px;border-radius:15px;backdrop-filter:blur(10px);box-shadow:0 8px 24px rgba(80,100,130,.18)}
  .bar button{font:inherit;font-weight:700;font-size:13px;color:#43515c;border:none;background:#fff;padding:9px 14px;border-radius:11px;cursor:pointer;box-shadow:0 2px 0 rgba(80,100,130,.16)}
  .bar button:active{transform:translateY(1px)}
  .hint{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);z-index:4;font-size:13px;font-weight:600;opacity:.6;pointer-events:none;transition:opacity .6s;white-space:nowrap;text-shadow:0 1px 0 rgba(255,255,255,.6)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>多米诺</b><span>划一道摆一排，点骨牌推倒</span></div>
<div class="hint" id="hint">🁢 手指划一道，摆出一排骨牌</div>
<div class="bar"><button id="push">👉 推倒</button><button id="clear">🧹 清空</button></div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,groundY=0,Lh=0,TH=0,SP=0;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  groundY=H*0.72; Lh=Math.min(90,H*0.16); TH=Lh*0.2; SP=Lh*0.62;
}
window.addEventListener('resize',resize); resize();

const COLS=['#ff6b8a','#ffa64d','#ffd23d','#4fd18b','#4dc4ff','#8a7bff','#ff8fd0'];
let doms=[];
function seedRow(){ doms=[]; const n=16, x0=W*0.14, step=(W*0.72)/(n-1);
  for(let i=0;i<n;i++) doms.push({x:x0+i*step, ang:0, av:0, col:COLS[i%COLS.length], pip:1+((Math.random()*6)|0)}); }
resize(); seedRow();

const GT=26, MAXAV=9;
function step(dt){
  doms.sort((a,b)=>a.x-b.x);
  for(const d of doms){
    if(d.ang>0.02 && d.ang<Math.PI/2){ d.av += Math.sin(d.ang)*GT*dt; if(d.av>MAXAV)d.av=MAXAV; d.ang += d.av*dt;
      if(d.ang>=Math.PI/2){ d.ang=Math.PI/2; d.av=0; } }
  }
  // collisions: a falling domino pushes the next to its right
  for(let i=0;i<doms.length-1;i++){ const a=doms[i], b=doms[i+1];
    const tipX=a.x+Lh*Math.sin(a.ang);
    if(a.ang>0.05 && tipX >= b.x-TH*0.6 && b.ang<0.5){ b.av=Math.max(b.av, 3+a.av*0.35); if(b.ang<0.06)b.ang=0.08; }
  }
}
function pushDomino(d){ if(d.ang<0.06){ d.ang=0.14; d.av=4.5; } }

function draw(){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#eef5f8'); g.addColorStop(1,'#dbe8ee');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // floor
  ctx.fillStyle='#cdd9df'; ctx.fillRect(0,groundY,W,H-groundY);
  ctx.strokeStyle='rgba(90,110,130,.2)'; ctx.beginPath();ctx.moveTo(0,groundY);ctx.lineTo(W,groundY);ctx.stroke();
  for(const d of doms){
    ctx.save(); ctx.translate(d.x,groundY); ctx.rotate(d.ang);
    // shadow-ish base
    ctx.fillStyle='rgba(60,80,95,.12)'; ctx.beginPath();ctx.ellipse(0,2,TH*0.9,4,0,0,6.28);ctx.fill();
    // body
    const r=4; const x=-TH/2,y=-Lh,w=TH,h=Lh;
    ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
    ctx.fillStyle=d.col; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1;ctx.stroke();
    // divider + pips
    ctx.strokeStyle='rgba(0,0,0,.14)';ctx.beginPath();ctx.moveTo(x+2,-Lh*0.5);ctx.lineTo(x+w-2,-Lh*0.5);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.9)';
    const pipsTop=Math.min(3,d.pip), pipsBot=Math.min(3,7-d.pip);
    for(let k=0;k<pipsTop;k++){ ctx.beginPath();ctx.arc(0,-Lh*0.78+ (k-1)*TH*0.5*(pipsTop>1?1:0), TH*0.14,0,6.28);ctx.fill(); }
    for(let k=0;k<pipsBot;k++){ ctx.beginPath();ctx.arc(0,-Lh*0.24+ (k-1)*TH*0.5*(pipsBot>1?1:0), TH*0.14,0,6.28);ctx.fill(); }
    ctx.restore();
  }
}
let last=performance.now();
function frame(now){ const dt=Math.min((now-last)/1000,0.033); last=now; step(dt); draw(); requestAnimationFrame(frame); }

// ---- input ----
let placing=false, lastX=null, movedFar=false, downX=0;
function nearDomino(x,y){ for(const d of doms){ const dx=x-(d.x+Lh*0.5*Math.sin(d.ang)); const dy=y-(groundY-Lh*0.5*Math.cos(d.ang)); if(dx*dx+dy*dy<(Lh*0.5)**2)return d; } return null; }
cv.addEventListener('pointerdown',e=>{e.preventDefault();cv.setPointerCapture(e.pointerId);
  downX=e.clientX; movedFar=false; const hit=nearDomino(e.clientX,e.clientY);
  if(hit){ pushDomino(hit); placing=false; } else { placing=true; lastX=e.clientX; addDom(e.clientX); }
  hideHint(); });
cv.addEventListener('pointermove',e=>{ if(!placing)return; if(Math.abs(e.clientX-downX)>8)movedFar=true; if(Math.abs(e.clientX-lastX)>=SP){ addDom(e.clientX); lastX=e.clientX; } });
cv.addEventListener('pointerup',()=>placing=false);
cv.addEventListener('pointercancel',()=>placing=false);
function addDom(x){ for(const d of doms){ if(Math.abs(d.x-x)<TH*1.2)return; } doms.push({x, ang:0, av:0, col:COLS[(doms.length)%COLS.length], pip:1+((Math.random()*6)|0)}); }

let hintGone=false; function hideHint(){if(hintGone)return;hintGone=true;document.getElementById('hint').style.opacity=0;}
document.getElementById('push').onclick=()=>{ let lm=null; for(const d of doms){ if(d.ang<0.06 && (!lm||d.x<lm.x))lm=d; } if(lm)pushDomino(lm); };
document.getElementById('clear').onclick=()=>{ doms=[]; };
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
