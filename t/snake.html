<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>贪吃蛇 · Snake</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#eaf6ea;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#3f5a44;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:1px;text-shadow:0 1px 0 rgba(255,255,255,.7)}
  .title span{display:block;font-size:12px;opacity:.6;margin-top:2px;font-weight:600}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>贪吃蛇</b><span>方向键 / 手指划，吃果子变长</span></div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,COLS=17,ROWS=13,cell=0,ox=0,oy=0;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const bw=Math.min(W*0.92,760), bh=Math.min(H*0.78,H-120);
  cell=Math.floor(Math.min(bw/COLS,bh/ROWS)); ox=(W-cell*COLS)/2; oy=(H-cell*ROWS)/2+10;
}
window.addEventListener('resize',resize); resize();

let actx=null,master=null;
function initAudio(){ if(actx)return; try{actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=0.4;master.connect(actx.destination);}catch(e){} }
function nom(f){ if(!actx)return;const t=actx.currentTime;const o=actx.createOscillator();o.type='triangle';o.frequency.setValueAtTime(f||500,t);o.frequency.exponentialRampToValueAtTime((f||500)*1.6,t+0.08);const g=actx.createGain();g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.12);o.connect(g);g.connect(master);o.start(t);o.stop(t+0.14);}
function buzz(){ if(!actx)return;const t=actx.currentTime;const o=actx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(60,t+0.3);const g=actx.createGain();g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.32);o.connect(g);g.connect(master);o.start(t);o.stop(t+0.34);}

let snake, prev, dir, ndir, food, score, best=0, state, moveT, interval, progress, foodPulse=0;
function reset(){ snake=[{x:5,y:6},{x:4,y:6},{x:3,y:6}]; prev=snake.map(s=>({...s})); dir={x:1,y:0}; ndir={x:1,y:0}; score=0; state='play'; interval=0.16; moveT=0; progress=0; placeFood(); }
function placeFood(){ let p; do{ p={x:(Math.random()*COLS)|0,y:(Math.random()*ROWS)|0}; }while(snake.some(s=>s.x===p.x&&s.y===p.y)); food=p; }
reset();

function move(){
  dir=ndir; prev=snake.map(s=>({...s}));
  const nh={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if(nh.x<0||nh.x>=COLS||nh.y<0||nh.y>=ROWS || snake.some((s,i)=>i<snake.length-1&&s.x===nh.x&&s.y===nh.y)){ state='over'; best=Math.max(best,score); buzz(); return; }
  snake.unshift(nh);
  if(nh.x===food.x&&nh.y===food.y){ score++; foodPulse=1; nom(400+score*20); placeFood(); prev.unshift({...prev[0]}); if(interval>0.07)interval-=0.004; }
  else { snake.pop(); }
}
function step(dt){
  if(state!=='play')return; moveT+=dt; progress=Math.min(1,moveT/interval);
  if(moveT>=interval){ moveT-=interval; move(); progress=0; }
  if(foodPulse>0)foodPulse-=dt*3;
}
const ease=x=>x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2;
function px(gx){return ox+gx*cell+cell/2;} function py(gy){return oy+gy*cell+cell/2;}
function draw(){
  ctx.fillStyle='#eaf6ea'; ctx.fillRect(0,0,W,H);
  // board
  ctx.fillStyle='#dcefdc'; ctx.fillRect(ox,oy,cell*COLS,cell*ROWS);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ if((r+c)%2){ ctx.fillStyle='#d3ebd3'; ctx.fillRect(ox+c*cell,oy+r*cell,cell,cell);} }
  ctx.strokeStyle='rgba(90,140,90,.3)';ctx.lineWidth=3;ctx.strokeRect(ox,oy,cell*COLS,cell*ROWS);
  // food
  const fp=1+foodPulse*0.3; ctx.font=Math.floor(cell*0.8*fp)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🍎', px(food.x), py(food.y)+1);
  // snake (smooth interpolated)
  const e=ease(progress); const pts=[];
  for(let i=0;i<snake.length;i++){ const p=prev[i]||snake[i]; pts.push([px(p.x)+(px(snake[i].x)-px(p.x))*e, py(p.y)+(py(snake[i].y)-py(p.y))*e]); }
  ctx.strokeStyle='#4caf50';ctx.lineWidth=cell*0.78;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.stroke();
  ctx.strokeStyle='#66d06f';ctx.lineWidth=cell*0.5;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.stroke();
  // head + eyes
  const hx=pts[0][0],hy=pts[0][1];
  ctx.fillStyle='#4caf50';ctx.beginPath();ctx.arc(hx,hy,cell*0.42,0,6.28);ctx.fill();
  const ex=dir.y!==0?0.2:0.16, ey=dir.x!==0?0.2:0.16;
  for(const s of [-1,1]){ const eyx=hx + dir.x*cell*0.14 + (dir.x!==0?0:s*cell*0.2), eyy=hy + dir.y*cell*0.14 + (dir.y!==0?0:s*cell*0.2);
    const eyx2=hx + dir.x*cell*0.12 + (dir.y!==0?s*cell*0.2:0), eyy2=hy + dir.y*cell*0.12 + (dir.x!==0?s*cell*0.2:0);
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(eyx2,eyy2,cell*0.11,0,6.28);ctx.fill();
    ctx.fillStyle='#223';ctx.beginPath();ctx.arc(eyx2+dir.x*cell*0.04,eyy2+dir.y*cell*0.04,cell*0.055,0,6.28);ctx.fill(); }
  // HUD
  ctx.fillStyle='#3f5a44';ctx.font='800 24px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.fillText('长度 '+snake.length+'    最佳 '+(best+3), W/2, oy-16); ctx.textAlign='left';
  if(state==='over'){ ctx.fillStyle='rgba(234,246,234,0.82)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#3f5a44';ctx.font='800 40px -apple-system,sans-serif';ctx.fillText('撞到啦！',W/2,H*0.42);
    ctx.fillStyle='#4caf50';ctx.font='800 54px -apple-system,sans-serif';ctx.fillText('长到 '+snake.length,W/2,H*0.42+64);ctx.fillStyle='#3f5a44';ctx.font='700 20px -apple-system,sans-serif';ctx.fillText('点屏幕再来一条',W/2,H*0.42+104);ctx.textAlign='left'; }
}
let last=performance.now();
function frame(now){ const dt=Math.min((now-last)/1000,0.05); last=now; step(dt); draw(); requestAnimationFrame(frame); }

function turn(dx,dy){ if(dx===-dir.x&&dy===-dir.y)return; ndir={x:dx,y:dy}; }
addEventListener('keydown',e=>{ const m={ArrowLeft:[-1,0],ArrowRight:[1,0],ArrowUp:[0,-1],ArrowDown:[0,1],a:[-1,0],d:[1,0],w:[0,-1],s:[0,1]}[e.key]; if(m){e.preventDefault();initAudio();if(state==='over'){reset();return;}turn(m[0],m[1]);} });
let sx=0,sy=0,sd=false;
cv.addEventListener('pointerdown',e=>{e.preventDefault();cv.setPointerCapture(e.pointerId);initAudio();if(actx&&actx.state==='suspended')actx.resume();if(state==='over'){reset();return;}sd=true;sx=e.clientX;sy=e.clientY;});
cv.addEventListener('pointerup',e=>{ if(!sd)return;sd=false;const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.hypot(dx,dy)<20)return;if(Math.abs(dx)>Math.abs(dy))turn(dx>0?1:-1,0);else turn(0,dy>0?1:-1);});
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
