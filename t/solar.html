<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>太阳系 · Solar</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#03030a;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#dfe4ff;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:2px}
  .title span{display:block;font-size:12px;opacity:.55;margin-top:3px;font-weight:600}
  .bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;display:flex;gap:8px;align-items:center;
    background:rgba(16,18,40,.5);border:1px solid rgba(150,160,255,.2);padding:8px 12px;border-radius:15px;backdrop-filter:blur(10px)}
  .bar button{font:inherit;font-weight:700;font-size:13px;color:#dfe4ff;border:1px solid rgba(160,160,255,.25);background:rgba(255,255,255,.05);padding:8px 13px;border-radius:11px;cursor:pointer}
  .bar button.on{background:linear-gradient(90deg,#ffb04d,#ff6a8a);border-color:transparent;color:#1a1030}
  .hint{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);z-index:4;font-size:13px;font-weight:600;opacity:.6;pointer-events:none;transition:opacity .6s;white-space:nowrap}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>太阳系</b><span>点行星看名字，调快慢看公转</span></div>
<div class="hint" id="hint">🪐 点一颗行星试试</div>
<div class="bar"><button id="slow">🐢 慢</button><button id="norm" class="on">▶ 正常</button><button id="fast">⏩ 快</button></div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,cx=0,cy=0,R=0,stars=[];
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cx=W/2; cy=H*0.5; R=Math.min(W,H)*0.46;
  stars=[]; for(let i=0;i<130;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.2,p:Math.random()*6.28});
}
window.addEventListener('resize',resize); resize();

// name, orbit(frac of R), size(px base), period(yr), color, hasRing, hasMoon
const P=[
  ['水星',0.13,3.2,0.24,'#b7a99a',0,0],['金星',0.19,5.2,0.62,'#e6c88a',0,0],['地球',0.26,5.6,1.0,'#5aa0ff',0,1],
  ['火星',0.33,4.2,1.88,'#e0663d',0,0],['木星',0.48,13,11.9,'#e8b784',0,0],['土星',0.62,11,29.4,'#e6d3a0',1,0],
  ['天王星',0.76,7.5,84,'#8fe0e6',0,0],['海王星',0.9,7.2,165,'#4d6ff0',0,0]
];
let planets=P.map(p=>({name:p[0],o:p[1],sz:p[2],per:p[3],col:p[4],ring:p[5],moon:p[6],ang:Math.random()*6.28}));
let speed=1, t=0, selected=-1, moonA=0;
const EARTH_W=0.9; // earth angular speed baseline (rad/s at speed 1)

function step(dt){ for(const p of planets){ p.ang += (EARTH_W/p.per)*speed*dt; } moonA+=2.5*speed*dt; }
function ppos(p){ const r=p.o*R; return [cx+Math.cos(p.ang)*r, cy+Math.sin(p.ang)*r]; }
function draw(){
  ctx.fillStyle='#03030a'; ctx.fillRect(0,0,W,H);
  for(const s of stars){ const tw=0.5+0.5*Math.sin(t*2+s.p); ctx.fillStyle='rgba(220,230,255,'+(0.2+tw*0.5)+')'; ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill(); }
  // orbits
  for(const p of planets){ ctx.strokeStyle='rgba(150,170,255,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(cx,cy,p.o*R,0,6.28);ctx.stroke(); }
  // sun
  const sg=ctx.createRadialGradient(cx,cy,2,cx,cy,R*0.11); sg.addColorStop(0,'#fff6c0');sg.addColorStop(0.4,'#ffcf4d');sg.addColorStop(1,'#ff7a1a');
  ctx.save();ctx.globalCompositeOperation='lighter';const halo=ctx.createRadialGradient(cx,cy,0,cx,cy,R*0.22);halo.addColorStop(0,'rgba(255,190,80,0.5)');halo.addColorStop(1,'rgba(255,150,50,0)');ctx.fillStyle=halo;ctx.beginPath();ctx.arc(cx,cy,R*0.22,0,6.28);ctx.fill();ctx.restore();
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(cx,cy,R*0.075,0,6.28);ctx.fill();
  // planets
  planets.forEach((p,i)=>{ const [x,y]=ppos(p);
    if(p.ring){ ctx.save();ctx.translate(x,y);ctx.rotate(-0.5);ctx.strokeStyle='rgba(230,210,160,.7)';ctx.lineWidth=p.sz*0.32;ctx.beginPath();ctx.ellipse(0,0,p.sz*1.9,p.sz*0.7,0,0,6.28);ctx.stroke();ctx.restore(); }
    const g=ctx.createRadialGradient(x-p.sz*0.3,y-p.sz*0.3,p.sz*0.2,x,y,p.sz); g.addColorStop(0,lighten(p.col));g.addColorStop(1,p.col);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,p.sz,0,6.28);ctx.fill();
    if(p.ring){ ctx.save();ctx.translate(x,y);ctx.rotate(-0.5);ctx.strokeStyle='rgba(230,210,160,.85)';ctx.lineWidth=p.sz*0.32;ctx.beginPath();ctx.ellipse(0,0,p.sz*1.9,p.sz*0.7,0,-0.5,Math.PI+0.5);ctx.stroke();ctx.restore(); }
    if(p.moon){ const mx=x+Math.cos(moonA)*p.sz*2.4,my=y+Math.sin(moonA)*p.sz*2.4;ctx.fillStyle='#cfd4e0';ctx.beginPath();ctx.arc(mx,my,2.4,0,6.28);ctx.fill(); }
    if(selected===i){ ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(x,y,p.sz+6,0,6.28);ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='800 16px -apple-system,sans-serif';ctx.textAlign='center';ctx.fillText(p.name,x,y-p.sz-14);ctx.textAlign='left'; }
  });
}
function lighten(hex){const n=parseInt(hex.slice(1),16);let r=Math.min(255,(n>>16)+70),g=Math.min(255,((n>>8)&255)+70),b=Math.min(255,(n&255)+70);return 'rgb('+r+','+g+','+b+')';}
let last=performance.now();
function frame(now){ const dt=Math.min((now-last)/1000,0.05); last=now; t+=dt; step(dt); draw(); requestAnimationFrame(frame); }

cv.addEventListener('pointerdown',e=>{ const mx=e.clientX,my=e.clientY; selected=-1; planets.forEach((p,i)=>{ const [x,y]=ppos(p); if((mx-x)**2+(my-y)**2<(p.sz+10)**2)selected=i; }); hideHint(); });
let hintGone=false; function hideHint(){if(hintGone)return;hintGone=true;document.getElementById('hint').style.opacity=0;}
function setSpeed(s,btn){ speed=s; ['slow','norm','fast'].forEach(id=>document.getElementById(id).classList.remove('on')); document.getElementById(btn).classList.add('on'); }
document.getElementById('slow').onclick=()=>setSpeed(0.25,'slow');
document.getElementById('norm').onclick=()=>setSpeed(1,'norm');
document.getElementById('fast').onclick=()=>setSpeed(5,'fast');
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
