<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>星座 · Constellation</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#03040f;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#cfd8ff;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:3px}
  .title span{display:block;font-size:12px;opacity:.55;margin-top:3px;font-weight:600;letter-spacing:1px}
  .bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;display:flex;gap:8px;
    background:rgba(18,20,44,.5);border:1px solid rgba(150,160,255,.2);padding:8px 12px;border-radius:15px;backdrop-filter:blur(10px)}
  .bar button{font:inherit;font-weight:700;font-size:13px;color:#cfd8ff;border:1px solid rgba(160,170,255,.25);
    background:rgba(255,255,255,.05);padding:8px 13px;border-radius:11px;cursor:pointer}
  .bar button.on{background:linear-gradient(90deg,#6ad0ff,#9a8cff);border-color:transparent;color:#0a1030}
  .hint{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);z-index:4;font-size:13px;font-weight:600;
    opacity:.6;pointer-events:none;transition:opacity .6s;white-space:nowrap}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>星座</b><span>从一颗星，拖到另一颗</span></div>
<div class="hint" id="hint">✦ 按住一颗星，拖向另一颗 ✦</div>
<div class="bar">
  <button id="shoot" class="on">🌠 流星</button>
  <button id="clear">🧹 重开夜空</button>
</div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,stars=[],edges=[],nebula=[],shooters=[],t=0;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  build();
}
window.addEventListener('resize',resize);
function build(){
  stars=[]; edges=[]; shooters=[];
  const n=Math.round(W*H/7000);
  for(let i=0;i<n;i++){
    const big=Math.random()<0.16;
    stars.push({x:20+Math.random()*(W-40),y:20+Math.random()*(H-150),
      baseR:big?(1.8+Math.random()*1.6):(0.6+Math.random()*1.1), tw:Math.random()*6.28,
      hue:200+Math.random()*80, con:false});
  }
  nebula=[]; for(let i=0;i<4;i++) nebula.push({x:Math.random()*W,y:Math.random()*H*0.8,r:120+Math.random()*220,hue:[220,260,190,300][i],a:0.05+Math.random()*0.05});
}
resize();

// ---- audio ----
let actx=null,master=null;
function initAudio(){ if(actx)return; try{actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=0.4;master.connect(actx.destination);}catch(e){} }
const SCALE=[0,2,4,7,9,12,14,16];
function chime(step){ if(!actx)return; const t0=actx.currentTime; const f=523.25*Math.pow(2,SCALE[step%SCALE.length]/12+Math.floor(step/SCALE.length));
  const o=actx.createOscillator();o.type='sine';o.frequency.value=f;
  const o2=actx.createOscillator();o2.type='sine';o2.frequency.value=f*2;
  const g=actx.createGain();g.gain.setValueAtTime(0.0001,t0);g.gain.exponentialRampToValueAtTime(0.35,t0+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t0+1.3);
  const g2=actx.createGain();g2.gain.setValueAtTime(0.0001,t0);g2.gain.exponentialRampToValueAtTime(0.08,t0+0.01);g2.gain.exponentialRampToValueAtTime(0.0001,t0+0.6);
  o.connect(g);o2.connect(g2);g.connect(master);g2.connect(master);o.start(t0);o2.start(t0);o.stop(t0+1.35);o2.stop(t0+0.65);}

// ---- interaction ----
let lastStar=-1, px=0,py=0, chainLen=0;
function nearest(x,y,rad){ let bi=-1,bd=rad*rad; for(let i=0;i<stars.length;i++){const dx=stars[i].x-x,dy=stars[i].y-y,d=dx*dx+dy*dy;if(d<bd){bd=d;bi=i;}} return bi; }
function addEdge(a,b){ if(a===b||a<0||b<0)return false; const k=a<b?a+'-'+b:b+'-'+a; if(edges.some(e=>e.k===k))return false;
  edges.push({a,b,k,t}); stars[a].con=true; stars[b].con=true; chainLen++; chime(chainLen); return true; }
function onDown(x,y){ initAudio(); if(actx&&actx.state==='suspended')actx.resume(); px=x;py=y; const i=nearest(x,y,30); lastStar=i; chainLen=0; if(i>=0){stars[i].con=true;} hideHint(); }
function onMove(x,y){ px=x;py=y; if(lastStar<0)return; const i=nearest(x,y,26); if(i>=0 && i!==lastStar){ if(addEdge(lastStar,i)) lastStar=i; } }
function onUp(){ lastStar=-1; }
cv.addEventListener('pointerdown',e=>{e.preventDefault();cv.setPointerCapture(e.pointerId);onDown(e.clientX,e.clientY);});
cv.addEventListener('pointermove',e=>onMove(e.clientX,e.clientY));
cv.addEventListener('pointerup',onUp);
cv.addEventListener('pointercancel',onUp);

// ---- shooters ----
let AUTO=true, shootNext=2;
function spawnShooter(){ const x=Math.random()*W*0.7, y=Math.random()*H*0.3; shooters.push({x,y,vx:200+Math.random()*160,vy:80+Math.random()*80,life:1.0}); }

// ---- render ----
function draw(){
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#05061c'); g.addColorStop(.6,'#080a24'); g.addColorStop(1,'#0d0a22');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // nebula
  ctx.globalCompositeOperation='lighter';
  for(const nb of nebula){ const rg=ctx.createRadialGradient(nb.x,nb.y,0,nb.x,nb.y,nb.r); rg.addColorStop(0,'hsla('+nb.hue+',70%,60%,'+nb.a+')'); rg.addColorStop(1,'hsla('+nb.hue+',70%,60%,0)'); ctx.fillStyle=rg; ctx.fillRect(nb.x-nb.r,nb.y-nb.r,nb.r*2,nb.r*2); }
  ctx.globalCompositeOperation='source-over';
  // edges (glow)
  ctx.globalCompositeOperation='lighter';
  for(const e of edges){ const a=stars[e.a],b=stars[e.b]; const fade=Math.min(1,(t-e.t)*3);
    ctx.strokeStyle='rgba(150,200,255,'+(0.5)+')'; ctx.lineWidth=1.2; ctx.shadowColor='rgba(120,180,255,.9)'; ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(a.x+(b.x-a.x)*fade,a.y+(b.y-a.y)*fade);ctx.stroke(); }
  ctx.shadowBlur=0;
  // rubber band
  if(lastStar>=0){ const s=stars[lastStar]; ctx.strokeStyle='rgba(160,200,255,.35)'; ctx.lineWidth=1; ctx.setLineDash([4,6]); ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(px,py);ctx.stroke(); ctx.setLineDash([]); }
  ctx.globalCompositeOperation='source-over';
  // stars
  ctx.globalCompositeOperation='lighter';
  for(const s of stars){ const tw=0.6+0.4*Math.sin(t*2.5+s.tw); const r=s.baseR*(s.con?1.7:1)*(0.8+tw*0.4);
    if(s.con){ ctx.fillStyle='rgba(180,220,255,'+(0.9*tw)+')'; ctx.shadowColor='rgba(150,200,255,.9)'; ctx.shadowBlur=10; }
    else { ctx.fillStyle='rgba(230,235,255,'+(0.55+tw*0.4)+')'; ctx.shadowBlur=0; }
    ctx.beginPath();ctx.arc(s.x,s.y,r,0,6.28);ctx.fill(); ctx.shadowBlur=0; }
  // shooters
  for(const sh of shooters){ const a=Math.max(0,sh.life); ctx.strokeStyle='rgba(255,255,255,'+a+')'; ctx.lineWidth=2; ctx.shadowColor='rgba(180,220,255,.9)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(sh.x,sh.y);ctx.lineTo(sh.x-sh.vx*0.12,sh.y-sh.vy*0.12);ctx.stroke();ctx.shadowBlur=0; }
  ctx.globalCompositeOperation='source-over';
}
function update(dt){ for(let i=shooters.length-1;i>=0;i--){const s=shooters[i];s.life-=dt*0.7;s.x+=s.vx*dt;s.y+=s.vy*dt;if(s.life<=0||s.x>W+50)shooters.splice(i,1);} }
let last=performance.now();
function frame(now){ const dt=Math.min((now-last)/1000,0.05); last=now; t+=dt;
  if(AUTO && t>shootNext){ shootNext=t+2.5+Math.random()*4; spawnShooter(); }
  update(dt); draw(); requestAnimationFrame(frame); }

let hintGone=false; function hideHint(){if(hintGone)return;hintGone=true;document.getElementById('hint').style.opacity=0;}
document.getElementById('shoot').onclick=e=>{AUTO=!AUTO;e.target.classList.toggle('on',AUTO); if(AUTO)shootNext=t+0.2;};
document.getElementById('clear').onclick=()=>{ edges=[]; for(const s of stars)s.con=false; build(); };
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
