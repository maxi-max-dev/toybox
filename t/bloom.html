<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>种一朵 · Bloom</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#fce7d8;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#5a463c;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:1px;text-shadow:0 1px 0 rgba(255,255,255,.6)}
  .title span{display:block;font-size:12px;opacity:.62;margin-top:2px;font-weight:600}
  .bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:96vw;
    background:rgba(255,255,255,.72);border:1px solid rgba(150,110,90,.2);
    padding:8px;border-radius:16px;backdrop-filter:blur(10px);box-shadow:0 8px 28px rgba(150,90,70,.2)}
  .bar button{font:inherit;font-weight:700;font-size:13px;color:#5a463c;border:none;background:#fff;
    padding:9px 13px;border-radius:11px;cursor:pointer;box-shadow:0 2px 0 rgba(150,90,70,.16);transition:transform .08s}
  .bar button:active{transform:translateY(1px);box-shadow:0 1px 0 rgba(150,90,70,.16)}
  .count{position:fixed;top:18px;right:20px;z-index:5;font-weight:800;font-size:14px;opacity:.5;pointer-events:none}
  .hint{position:fixed;left:50%;bottom:66px;transform:translateX(-50%);z-index:4;font-size:13px;font-weight:600;
    opacity:.55;pointer-events:none;transition:opacity .6s;white-space:nowrap;text-shadow:0 1px 0 rgba(255,255,255,.6)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>种一朵</b><span>点一下地面，看它长成一朵花</span></div>
<div class="count" id="count"></div>
<div class="hint" id="hint">🌱 点点下面的土地 🌱</div>
<div class="bar">
  <button id="field">🌸 一片花海</button>
  <button id="again">🌼 重开一茬</button>
  <button id="clear">🍂 清空</button>
</div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,groundY=0;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  groundY=H*0.9;
}
window.addEventListener('resize',resize); resize();

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const FLOWERS=[['#ff6b8a','#ffd1dc'],['#ffb454','#ffe6b0'],['#ff5d5d','#ffc2c2'],['#c86bff','#ecd1ff'],
  ['#ff8fd0','#ffd6ee'],['#ffe14d','#fff4b0'],['#6bd3ff','#cceeff'],['#ff7a4d','#ffd0bc']];

let plants=[], t=0;
function plant(x){
  const seed=(Math.random()*1e9)|0;
  const rng=mulberry32(seed);
  const fc=FLOWERS[(rng()*FLOWERS.length)|0];
  plants.push({x, seed, t0:t, dur:1.8+rng()*0.9, maxDepth:6,
    baseLen:H*(0.085+rng()*0.03), ratio:0.76+rng()*0.06, spread:0.55+rng()*0.35,
    stem:'#4a9a55', leaf:'#57b062', flower:fc[0], flower2:fc[1],
    phase:rng()*6.28, windAmp:0.05+rng()*0.04, size:0.9+rng()*0.5});
  if(plants.length>26) plants.shift();
  count();
}
function count(){document.getElementById('count').textContent=plants.length+' 株';}
const ease=x=>1-Math.pow(1-x,3);

function drawLeaf(x,y,a,size,col){
  ctx.save(); ctx.translate(x,y); ctx.rotate(a);
  ctx.fillStyle=col; ctx.beginPath(); ctx.ellipse(0,-size*0.5,size*0.32,size*0.6,0,0,6.28); ctx.fill();
  ctx.restore();
}
function drawFlower(x,y,scale,col,col2){
  if(scale<=0.02)return;
  const R=6*scale;
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle=col;
  for(let i=0;i<6;i++){ const a=i/6*6.28; ctx.beginPath();
    ctx.ellipse(Math.cos(a)*R*0.9,Math.sin(a)*R*0.9,R*0.72,R*0.46,a,0,6.28); ctx.fill(); }
  ctx.fillStyle=col2; ctx.beginPath(); ctx.arc(0,0,R*0.7,0,6.28); ctx.fill();
  ctx.fillStyle='#ffd24d'; ctx.beginPath(); ctx.arc(0,0,R*0.38,0,6.28); ctx.fill();
  ctx.restore();
}
function walk(px,py,angle,len,depth,budget,rng,pl){
  if(budget<=0) return;
  if(depth>=pl.maxDepth || len<3){
    drawFlower(px,py,Math.min(1,budget)*pl.size,pl.flower,pl.flower2); return;
  }
  const grow=Math.min(1,budget);
  const sway=pl.windAmp*Math.sin(t*1.3+pl.phase+depth*0.4)*(depth/pl.maxDepth);
  const a=angle+sway;
  const ex=px+Math.sin(a)*len*grow, ey=py-Math.cos(a)*len*grow;
  ctx.lineWidth=Math.max(1.2,(pl.maxDepth-depth)*1.3);
  ctx.strokeStyle=pl.stem; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(ex,ey); ctx.stroke();
  if(grow<1){ drawFlower(ex,ey,grow*0.4*pl.size,pl.flower,pl.flower2); return; }
  if(depth>1 && rng()<0.55) drawLeaf(ex,ey,a+(rng()<0.5?0.6:-0.6),len*0.7,pl.leaf);
  const nb=rng()<0.18?3:2;
  const spread=pl.spread*(0.85+rng()*0.4);
  for(let i=0;i<nb;i++){
    const frac=nb===1?0:(i/(nb-1)-0.5);
    const ca=a+frac*spread+(rng()-0.5)*0.18;
    const cl=len*pl.ratio*(0.85+rng()*0.3);
    walk(ex,ey,ca,cl,depth+1,budget-1,rng,pl);
  }
}

function draw(){
  // dawn sky
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#ffe9c9'); g.addColorStop(.4,'#ffd8d8'); g.addColorStop(.75,'#f3d6f0'); g.addColorStop(1,'#e3e6ff');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // sun
  ctx.save(); ctx.globalAlpha=.5; ctx.fillStyle='#fff2c4';
  ctx.beginPath(); ctx.arc(W*0.82,H*0.2,58,0,6.28); ctx.fill(); ctx.restore();
  // ground
  const gg=ctx.createLinearGradient(0,groundY,0,H);
  gg.addColorStop(0,'#b7d98a'); gg.addColorStop(1,'#7fb06a');
  ctx.fillStyle=gg; ctx.fillRect(0,groundY,W,H-groundY);
  ctx.fillStyle='rgba(90,120,60,.35)';
  for(let x=0;x<W;x+=9){ const gy=groundY-2-Math.random()*0; ctx.fillRect(x, groundY-4, 2, 5); }
  // plants
  for(const pl of plants){
    const g0=ease(Math.min(1,(t-pl.t0)/pl.dur));
    const budget=g0*(pl.maxDepth+1);
    const rng=mulberry32(pl.seed);
    walk(pl.x,groundY,0,pl.baseLen,0,budget,rng,pl);
  }
}
let last=performance.now();
function frame(now){ const dt=(now-last)/1000; last=now; t+=Math.min(dt,0.05); draw(); requestAnimationFrame(frame); }

// input: click ground to plant
let downX,downY,moved;
cv.addEventListener('pointerdown',e=>{e.preventDefault();downX=e.clientX;downY=e.clientY;moved=false;});
cv.addEventListener('pointermove',e=>{if(Math.hypot(e.clientX-downX,e.clientY-downY)>8)moved=true;});
cv.addEventListener('pointerup',e=>{ if(!moved){ const x=Math.max(20,Math.min(W-20,e.clientX)); plant(x); hideHint(); } });

let hintGone=false; function hideHint(){if(hintGone)return;hintGone=true;document.getElementById('hint').style.opacity=0;}
document.getElementById('field').onclick=()=>{const n=9;for(let i=0;i<n;i++)setTimeout(()=>plant(W*(0.08+0.84*i/(n-1))+(Math.random()-.5)*30),i*120);hideHint();};
document.getElementById('again').onclick=()=>{plants=[];seed();};
document.getElementById('clear').onclick=()=>{plants=[];count();};

function seed(){ plant(W*0.3); plants[0].t0=t-1.2; plant(W*0.55); plant(W*0.72); plants[2].t0=t-0.5; count(); }
seed();
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
