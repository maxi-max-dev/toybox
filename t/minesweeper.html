<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>扫雷 · Minesweeper</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#c9d2dc;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;
    color:#37475a;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:14px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:19px;font-weight:800;letter-spacing:1px;text-shadow:0 1px 0 rgba(255,255,255,.7)}
  .title span{display:block;font-size:12px;opacity:.6;margin-top:2px;font-weight:600}
  .bar{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;display:flex;gap:8px;
    background:rgba(255,255,255,.8);border:1px solid rgba(90,110,130,.2);padding:8px;border-radius:14px;backdrop-filter:blur(8px);box-shadow:0 6px 20px rgba(80,110,140,.18)}
  .bar button{font:inherit;font-weight:700;font-size:14px;color:#37475a;border:none;background:#fff;padding:9px 16px;border-radius:10px;cursor:pointer;box-shadow:0 2px 0 rgba(80,110,140,.16)}
  .bar button.on{background:linear-gradient(90deg,#ff8a4d,#ff5a7a);color:#fff}
  .bar button:active{transform:translateY(1px)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>扫雷</b><span>点开格子，数字=周围雷数</span></div>
<div class="bar"><button id="mode">⛏️ 挖</button><button id="reset">🙂 重来</button></div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,COLS=10,ROWS=13,MINES=20,cell=0,ox=0,oy=0;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const bw=Math.min(W*0.92,520), bh=Math.min(H*0.76,H-140);
  cell=Math.floor(Math.min(bw/COLS,bh/ROWS)); ox=(W-cell*COLS)/2; oy=(H-cell*ROWS)/2+14;
}
window.addEventListener('resize',resize); resize();

const NCOL=['','#1976d2','#388e3c','#d32f2f','#7b1fa2','#c2185b','#0097a7','#455a64','#5d4037'];
let grid, state, started, flags, revealedCount;
function reset(){ grid=[]; for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++)grid[r][c]={m:false,rv:false,fl:false,a:0};}
  state='play'; started=false; flags=0; revealedCount=0; }
reset();
function inb(r,c){return r>=0&&r<ROWS&&c>=0&&c<COLS;}
function neigh(r,c,fn){ for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){ if(!dr&&!dc)continue; if(inb(r+dr,c+dc))fn(r+dr,c+dc); } }
function placeMines(sr,sc){ let safe=new Set(); safe.add(sr+','+sc); neigh(sr,sc,(r,c)=>safe.add(r+','+c));
  let placed=0; while(placed<MINES){ const r=(Math.random()*ROWS)|0,c=(Math.random()*COLS)|0; if(grid[r][c].m||safe.has(r+','+c))continue; grid[r][c].m=true; placed++; }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ let n=0; neigh(r,c,(rr,cc)=>{if(grid[rr][cc].m)n++;}); grid[r][c].a=n; }
  started=true; }
function reveal(r,c){ const g=grid[r][c]; if(g.rv||g.fl)return; g.rv=true; revealedCount++;
  if(g.m){ state='lose'; return; }
  if(g.a===0) neigh(r,c,(rr,cc)=>{ if(!grid[rr][cc].rv&&!grid[rr][cc].m) reveal(rr,cc); });
}
function dig(r,c){ if(state!=='play')return; if(!started)placeMines(r,c); const g=grid[r][c]; if(g.fl)return; reveal(r,c);
  if(state==='lose'){ for(let rr=0;rr<ROWS;rr++)for(let cc=0;cc<COLS;cc++)if(grid[rr][cc].m)grid[rr][cc].rv=true; }
  else if(revealedCount===ROWS*COLS-MINES){ state='win'; } }
function flag(r,c){ if(state!=='play'||!started)return; const g=grid[r][c]; if(g.rv)return; g.fl=!g.fl; flags+=g.fl?1:-1; }

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function draw(){
  ctx.fillStyle='#c9d2dc'; ctx.fillRect(0,0,W,H);
  ctx.font='800 '+Math.floor(cell*0.5)+'px -apple-system,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ const g=grid[r][c]; const x=ox+c*cell,y=oy+r*cell,pad=1.5;
    if(g.rv){ rr(x+pad,y+pad,cell-pad*2,cell-pad*2,4); ctx.fillStyle=g.m?(state==='lose'?'#ff6b6b':'#e6ebf0'):'#e9eef3'; ctx.fill();
      if(g.m){ ctx.font=Math.floor(cell*0.6)+'px sans-serif'; ctx.fillText('💣',x+cell/2,y+cell/2+1); ctx.font='800 '+Math.floor(cell*0.5)+'px -apple-system,sans-serif'; }
      else if(g.a>0){ ctx.fillStyle=NCOL[g.a]; ctx.fillText(g.a,x+cell/2,y+cell/2+1); }
    } else { rr(x+pad,y+pad,cell-pad*2,cell-pad*2,4); const gr=ctx.createLinearGradient(x,y,x,y+cell); gr.addColorStop(0,'#eef3f8');gr.addColorStop(1,'#c4cfda'); ctx.fillStyle=gr; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=1.5;ctx.stroke();
      if(g.fl){ ctx.font=Math.floor(cell*0.55)+'px sans-serif'; ctx.fillText('🚩',x+cell/2,y+cell/2+1); ctx.font='800 '+Math.floor(cell*0.5)+'px -apple-system,sans-serif'; }
    }
  }
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
  // HUD
  ctx.fillStyle='#37475a';ctx.font='800 22px -apple-system,sans-serif';ctx.textAlign='center';
  const msg = state==='win'?'🎉 全部扫清！':state==='lose'?'💥 踩到雷了':('💣 剩 '+(MINES-flags));
  ctx.fillText(msg, W/2, oy-16); ctx.textAlign='left';
  if(state==='win'||state==='lose'){ ctx.fillStyle='rgba(201,210,220,0.35)';ctx.fillRect(0,0,W,H); ctx.textAlign='center';ctx.fillStyle=state==='win'?'#2e9e5b':'#d84343';ctx.font='800 40px -apple-system,sans-serif';
    ctx.fillText(state==='win'?'扫雷成功！':'游戏结束',W/2,oy-56);ctx.textAlign='left'; }
}
let last=performance.now();
function frame(now){ last=now; draw(); requestAnimationFrame(frame); }

let mode='dig';
cv.addEventListener('pointerdown',e=>{e.preventDefault(); if(state!=='play'){ reset(); return; } const c=((e.clientX-ox)/cell)|0, r=((e.clientY-oy)/cell)|0; if(!inb(r,c))return; if(mode==='dig')dig(r,c); else flag(r,c); });
document.getElementById('mode').onclick=e=>{ mode=mode==='dig'?'flag':'dig'; e.target.textContent=mode==='dig'?'⛏️ 挖':'🚩 标记'; e.target.classList.toggle('on',mode==='flag'); };
document.getElementById('reset').onclick=()=>reset();
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
