<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>雷达 · Radar</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;overscroll-behavior:none;background:#02100a;
    font-family:"SF Mono",ui-monospace,Menlo,monospace;color:#5effa8;touch-action:none;user-select:none}
  #cv{display:block;position:fixed;inset:0}
  .title{position:fixed;top:15px;left:18px;z-index:5;pointer-events:none}
  .title b{font-size:18px;font-weight:800;letter-spacing:3px;color:#7effb8;text-shadow:0 0 8px rgba(94,255,168,.6)}
  .title span{display:block;font-size:11px;opacity:.6;margin-top:3px;font-weight:600;letter-spacing:1px}
  .hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:4;font-size:12px;font-weight:600;opacity:.55;pointer-events:none;transition:opacity .6s;white-space:nowrap;letter-spacing:1px}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="title"><b>雷 达</b><span>点屏幕投放目标</span></div>
<div class="hint" id="hint">◎ 点一下投放一个目标</div>
<script>
(()=>{
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,dpr=1,cx=0,cy=0,R=0;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth||document.documentElement.clientWidth||800;
  H=window.innerHeight||document.documentElement.clientHeight||600;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cx=W/2; cy=H/2; R=Math.min(W,H)*0.42;
}
window.addEventListener('resize',resize); resize();

let actx=null,master=null;
function initAudio(){ if(actx)return; try{actx=new(window.AudioContext||window.webkitAudioContext)();master=actx.createGain();master.gain.value=0.35;master.connect(actx.destination);}catch(e){} }
function ping(dist){ if(!actx)return;const t=actx.currentTime;const o=actx.createOscillator();o.type='sine';o.frequency.value=760+dist*300;const g=actx.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.35,t+0.005);g.gain.exponentialRampToValueAtTime(0.0001,t+0.2);o.connect(g);g.connect(master);o.start(t);o.stop(t+0.22);}

let blips=[], sweep=0, prevSweep=0, t=0;
function addBlip(x,y){ const dx=x-cx,dy=y-cy,d=Math.hypot(dx,dy); if(d>R*0.98)return; blips.push({ang:Math.atan2(dy,dx),dist:d,lit:1,drift:(Math.random()-.5)*0.06}); if(blips.length>40)blips.shift(); }
function seed(){ blips=[]; for(let i=0;i<6;i++){ const a=Math.random()*6.28,d=R*(0.2+Math.random()*0.7); blips.push({ang:a,dist:d,lit:0,drift:(Math.random()-.5)*0.08}); } }
resize(); seed();

function step(dt){
  prevSweep=sweep; sweep=(sweep+dt*1.4)%(Math.PI*2);
  for(const b of blips){ b.ang=(b.ang+b.drift*dt+Math.PI*2)%(Math.PI*2);
    // ping when sweep crosses blip angle
    let s0=prevSweep, s1=sweep; const a=b.ang;
    const crossed = s1>=s0 ? (a>s0 && a<=s1) : (a>s0 || a<=s1);
    if(crossed){ b.lit=1; ping(b.dist/R); }
    b.lit-=dt*0.5; if(b.lit<0)b.lit=0;
  }
}
function draw(){
  ctx.fillStyle='#02100a'; ctx.fillRect(0,0,W,H);
  // scope backdrop
  ctx.save();
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,R); bg.addColorStop(0,'rgba(20,80,45,0.25)');bg.addColorStop(1,'rgba(6,30,18,0.1)');
  ctx.fillStyle=bg; ctx.beginPath();ctx.arc(cx,cy,R,0,6.28);ctx.fill();
  // rings
  ctx.strokeStyle='rgba(94,255,168,.28)';ctx.lineWidth=1;
  for(let i=1;i<=4;i++){ ctx.beginPath();ctx.arc(cx,cy,R*i/4,0,6.28);ctx.stroke(); }
  // crosshair + spokes
  for(let i=0;i<12;i++){ const a=i*Math.PI/6; ctx.strokeStyle=i%3===0?'rgba(94,255,168,.35)':'rgba(94,255,168,.15)'; ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);ctx.stroke(); }
  // degree labels
  ctx.fillStyle='rgba(120,255,190,.6)';ctx.font='11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<12;i++){ const a=i*Math.PI/6 - Math.PI/2; const deg=(i*30); ctx.fillText((deg<100?('0'+deg).slice(-3):deg), cx+Math.cos(a)*(R+16),cy+Math.sin(a)*(R+16)); }
  // sweep wedge (trailing gradient)
  ctx.save(); ctx.beginPath();ctx.arc(cx,cy,R,0,6.28);ctx.clip(); ctx.globalCompositeOperation='lighter';
  const tw=1.1; for(let k=0;k<20;k++){ const a=sweep-k*0.055; const al=(1-k/20)*0.14; ctx.strokeStyle='rgba(94,255,168,'+al+')';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);ctx.stroke(); }
  // bright sweep line
  ctx.strokeStyle='rgba(150,255,200,.9)';ctx.lineWidth=2.5;ctx.shadowColor='rgba(94,255,168,.9)';ctx.shadowBlur=8;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(sweep)*R,cy+Math.sin(sweep)*R);ctx.stroke();ctx.shadowBlur=0;
  ctx.restore();
  // blips
  ctx.globalCompositeOperation='lighter';
  for(const b of blips){ const x=cx+Math.cos(b.ang)*b.dist,y=cy+Math.sin(b.ang)*b.dist; const a=b.lit;
    if(a>0.02){ const rg=ctx.createRadialGradient(x,y,0,x,y,10+a*10); rg.addColorStop(0,'rgba(150,255,200,'+a+')');rg.addColorStop(1,'rgba(94,255,168,0)'); ctx.fillStyle=rg; ctx.fillRect(x-20,y-20,40,40); }
    ctx.fillStyle='rgba(160,255,205,'+(0.35+a*0.65)+')'; ctx.beginPath();ctx.arc(x,y,2.6+a*2,0,6.28);ctx.fill();
  }
  ctx.globalCompositeOperation='source-over';
  ctx.restore();
  // outer ring
  ctx.strokeStyle='rgba(94,255,168,.5)';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(cx,cy,R,0,6.28);ctx.stroke();
  // scanlines
  ctx.fillStyle='rgba(0,0,0,.12)'; for(let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1);
}
let last=performance.now();
function frame(now){ const dt=Math.min((now-last)/1000,0.04); last=now; t+=dt; step(dt); draw(); requestAnimationFrame(frame); }

cv.addEventListener('pointerdown',e=>{e.preventDefault();initAudio();if(actx&&actx.state==='suspended')actx.resume();addBlip(e.clientX,e.clientY);hideHint();});
let hintGone=false; function hideHint(){if(hintGone)return;hintGone=true;document.getElementById('hint').style.opacity=0;}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
